# novax.conf
# Configuration Nginx — MIWANOU Michaël (RSI)
# Reverse proxy : Laravel (port 8000) + Socket.io (port 3000)
#
# Installer : sudo cp novax.conf /etc/nginx/sites-available/novax
#             sudo ln -s /etc/nginx/sites-available/novax /etc/nginx/sites-enabled/
#             sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name novax.local localhost;

    # ── API Laravel (HTTP) ─────────────────────────────────────
    location /api {
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS pour Flutter Web
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
        add_header Access-Control-Allow-Headers "Authorization, Content-Type";
    }

    # ── Socket.io (WebSocket) ──────────────────────────────────
    location /socket.io {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;

        # Headers nécessaires pour WebSocket
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # Timeout long pour les connexions persistantes
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Health check ───────────────────────────────────────────
    location /health {
        proxy_pass http://localhost:3000/health;
    }
}
